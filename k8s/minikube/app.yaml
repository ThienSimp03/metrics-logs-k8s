apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  labels:
    app: spring-boot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
        # Quan trọng: Label này để Alloy nhận dạng và thu thập logs
        monitoring/logs: "true"
    spec:
      containers:
      - name: spring-boot-app
        # Đã build image local hoặc push lên registry
        image: logs-loki:latest
        # Dùng image pull policy này để Minikube dùng image ở local (nếu build bằng eval $(minikube docker-env))
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-app
spec:
  type: ClusterIP
  selector:
    app: spring-boot-app
  ports:
  - port: 8080
    targetPort: 8080
