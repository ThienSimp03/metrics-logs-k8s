apiVersion: apps/v1
kind: Deployment
metadata:
  name: spring-boot-app
  labels:
    app: spring-boot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spring-boot-app
  template:
    metadata:
      labels:
        app: spring-boot-app
        # Quan trọng: Label này để Alloy nhận dạng và thu thập logs
        monitoring/logs: "true"
    spec:
      containers:
      - name: spring-boot-app
        # Đã push image lên Google Container Registry (GCR) hoặc Artifact Registry (GAR)
        # Ví dụ: gcr.io/your-project-id/logs-loki:latest
        image: your-repo/logs-loki:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: spring-boot-app
spec:
  # LoadBalancer nếu muốn expose thẳng app ra ngoài trên GKE
  type: ClusterIP
  selector:
    app: spring-boot-app
  ports:
  - port: 8080
    targetPort: 8080
